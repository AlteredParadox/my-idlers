name: Release

# Builds the Docker image, publishes it to GitHub Container Registry, and cuts
# a GitHub Release whenever a version tag is pushed. Tag pushes only — routine
# branch syncs never trigger a build. No secrets needed: the built-in
# GITHUB_TOKEN authenticates to ghcr and creates the release.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push to ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image name and version tags
        id: meta
        run: |
          # ghcr requires a lowercase image path
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          # v4.1.0+ap.1 -> 4.1.0+ap.1 (release/display) -> 4.1.0-ap.1 (Docker tag: '+' is illegal)
          VERSION="${GITHUB_REF_NAME#v}"
          DOCKER_TAG="${VERSION//+/-}"
          echo "image=$IMAGE"           >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"       >> "$GITHUB_OUTPUT"
          echo "docker_tag=$DOCKER_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.docker_tag }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.meta.outputs.version }}
          body: |
            Docker image:

            ```
            docker pull ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.docker_tag }}
            docker pull ${{ steps.meta.outputs.image }}:latest
            ```

            See the **Fork revision** changelog in the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for what changed in this release.
          generate_release_notes: true
