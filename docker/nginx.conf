server {
    listen 8000;
    server_name _;

    root /app/public;
    index index.php;

    # Log to the container's output (alpine's default is files inside the
    # container). This is the log with real client addresses — php-fpm's
    # own access log only ever showed 127.0.0.1 (nginx is the FastCGI
    # client) and is disabled in docker/php-fpm-pool.conf.
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    # Favicon uploads are validation-capped at 40 KB; 2m leaves form headroom
    # without allowing huge bodies.
    client_max_body_size 2m;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Exactly index.php and nothing else reaches php-fpm: the webroot is
    # www-data-writable for favicon uploads, so "the file exists" is no
    # longer proof it shipped with the image — an exact match closes the
    # webshell class outright instead of trusting upload validation alone.
    location = /index.php {
        fastcgi_pass 127.0.0.1:9000;
        include fastcgi.conf;
    }

    location ~ \.php$ {
        return 404;
    }

    # Never serve dotfiles
    location ~ /\. {
        deny all;
    }
}
