server {
    listen 8000;
    server_name _;

    root /app/public;
    index index.php;

    # Log to the container's output (alpine's default is files inside the
    # container). This is the log with real client addresses — php-fpm's
    # own access log only ever showed 127.0.0.1 (nginx is the FastCGI
    # client) and is disabled in docker/php-fpm-pool.conf.
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    # Favicon uploads are validation-capped at 40 KB; 2m leaves form headroom
    # without allowing huge bodies.
    client_max_body_size 2m;

    # Browser-security headers (defense in depth; served on every response
    # incl. errors via `always`). NOTE: nginx add_header inheritance — any
    # location that declares its own add_header silently drops these, so
    # keep the location blocks add_header-free.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP audited against the app's actual origins: all JS/CSS/fonts are
    # self-hosted webpack-mix bundles (no CDNs); the compiled bootstrap CSS
    # embeds data: SVG images; Prometheus is proxied server-side through
    # /tools/prometheus/* so connect-src stays 'self'; geekbench and other
    # externals are plain <a href> links (not resource loads).
    # 'unsafe-inline' is required by the blades' inline <script> blocks and
    # event handlers; 'unsafe-eval' by the standalone Vue 2 build, which
    # compiles its in-DOM templates (delete-confirm modal on every index)
    # with new Function() at runtime — without it the rows Vue manages
    # vanish after first paint. The enforcement value here is the
    # no-foreign-script-origins + object-src / base-uri / form-action /
    # frame-ancestors lockdown.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Exactly index.php and nothing else reaches php-fpm: the webroot is
    # www-data-writable for favicon uploads, so "the file exists" is no
    # longer proof it shipped with the image — an exact match closes the
    # webshell class outright instead of trusting upload validation alone.
    location = /index.php {
        fastcgi_pass 127.0.0.1:9000;
        include fastcgi.conf;
    }

    location ~ \.php$ {
        return 404;
    }

    # Never serve dotfiles
    location ~ /\. {
        deny all;
    }
}
